{% extends "web_app/base.html" %}

{% block content %}
<section class="page-head">
    <div>
        <p class="eyebrow">Today</p>
        <h1>Occupancy Flow</h1>
    </div>
    <div class="status-pill" id="camera-status">camera: unknown</div>
</section>

<section class="metric-grid" aria-label="Daily totals">
    <article class="metric">
        <span>Entries</span>
        <strong id="total-in">0</strong>
    </article>
    <article class="metric">
        <span>Exits</span>
        <strong id="total-out">0</strong>
    </article>
    <article class="metric">
        <span>Total Crossings</span>
        <strong id="total-all">0</strong>
    </article>
</section>

<section class="content-grid">
    <article class="panel">
        <div class="panel-head">
            <h2>Counting Lines</h2>
            <a class="button ghost" href="/settings/">Edit</a>
        </div>
        <div id="line-summary" class="line-summary"></div>
    </article>
    <article class="panel">
        <div class="panel-head">
            <h2>Recent Events</h2>
            <a class="button ghost" href="/api/export/events/?format=csv">CSV</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Line</th>
                        <th>Direction</th>
                        <th>Track</th>
                    </tr>
                </thead>
                <tbody id="recent-events"></tbody>
            </table>
        </div>
    </article>
</section>
{% endblock %}
